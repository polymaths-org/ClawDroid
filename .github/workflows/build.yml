name: Android Build CI/CD

on:
  push:
    branches:
      - main
      - feat/**
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: clawdroid-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  release:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Validate release signing secrets
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          for name in RELEASE_KEYSTORE_BASE64 RELEASE_KEYSTORE_PASSWORD RELEASE_KEY_ALIAS RELEASE_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing secret: ${name}"
              exit 1
            fi
          done

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Sign and align release APK
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"
          unsigned_apk="$(find app/build/outputs/apk/release -name '*.apk' | head -1)"
          build_tools="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -1)"
          mkdir -p release
          "$build_tools/zipalign" -p -f 4 "$unsigned_apk" "$RUNNER_TEMP/aligned.apk"
          "$build_tools/apksigner" sign \
            --ks "$RUNNER_TEMP/release.jks" \
            --ks-pass "pass:$RELEASE_KEYSTORE_PASSWORD" \
            --ks-key-alias "$RELEASE_KEY_ALIAS" \
            --key-pass "pass:$RELEASE_KEY_PASSWORD" \
            --out "release/ClawDroid-${TAG_NAME}-signed.apk" \
            "$RUNNER_TEMP/aligned.apk"
          sha256sum "release/ClawDroid-${TAG_NAME}-signed.apk" > "release/ClawDroid-${TAG_NAME}-signed.apk.sha256"

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: clawdroid-release-apk
          path: release/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          apk="release/ClawDroid-${TAG_NAME}-signed.apk"
          checksum="${apk}.sha256"
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$apk" "$checksum" --clobber
          else
            gh release create "$TAG_NAME" "$apk" "$checksum" \
              --title "$TAG_NAME" \
              --notes "Automated release $TAG_NAME"
          fi
